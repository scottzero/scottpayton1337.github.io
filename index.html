<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scott Payton</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2ef;
      --globe: #ffffff;
      --ink: #1c1f1b;
      --ink-muted: #7a8078;
      --accent: #7a9e7e;
      --accent-soft: #c8deca;
      --border: rgba(122,158,126,0.25);
      --shadow: rgba(100,130,103,0.15);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--ink);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(122,158,126,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(122,158,126,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .name-tag {
      position: fixed;
      top: 2.5rem;
      left: 3rem;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.5s;
    }

    .name-tag h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 1.1;
    }

    .name-tag p {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 0.3rem;
    }

    .hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.5s;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .globe {
      position: relative;
      width: min(500px, 78vmin);
      height: min(500px, 78vmin);
      border-radius: 50%;
      background: var(--globe);
      box-shadow:
        0 0 0 1px rgba(122,158,126,0.2),
        0 20px 60px rgba(100,130,103,0.12),
        0 4px 20px rgba(100,130,103,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9),
        inset 0 -2px 8px rgba(122,158,126,0.06);
      opacity: 0;
      animation: globeIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards 0.2s;
    }

    .globe::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, transparent 55%);
      pointer-events: none;
    }

    .globe::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      border: 1px solid rgba(122,158,126,0.12);
      animation: slowSpin 25s linear infinite;
      pointer-events: none;
    }

    .node {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 2;
    }

    .node-about   { top: 20%; left: 50%; }
    .node-exp     { top: 50%; left: 87%; }
    .node-skills  { top: 80%; left: 66%; }
    .node-edu     { top: 80%; left: 34%; }
    .node-contact { top: 50%; left: 13%; }

    .node-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid white;
      box-shadow: 0 0 0 3px var(--accent-soft), 0 2px 8px var(--shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .node:hover .node-dot {
      transform: scale(1.5);
      box-shadow: 0 0 0 6px var(--accent-soft), 0 4px 16px var(--shadow);
    }

    .node-dot::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0;
      animation: pulse 2.5s ease-out infinite;
    }

    .node:nth-child(2) .node-dot::after { animation-delay: 0s; }
    .node:nth-child(3) .node-dot::after { animation-delay: 0.5s; }
    .node:nth-child(4) .node-dot::after { animation-delay: 1s; }
    .node:nth-child(5) .node-dot::after { animation-delay: 1.5s; }
    .node:nth-child(6) .node-dot::after { animation-delay: 2s; }

    .node-label {
      position: absolute;
      white-space: nowrap;
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
      transition: color 0.2s;
      pointer-events: none;
    }

    .node:hover .node-label { color: var(--accent); }

    .node-about   .node-label { bottom: 1.4rem; left: 50%; transform: translateX(-50%); }
    .node-exp     .node-label { top: 50%; right: 1.4rem; transform: translateY(-50%); }
    .node-skills  .node-label { top: 1.4rem; left: 50%; transform: translateX(-50%); }
    .node-edu     .node-label { top: 1.4rem; left: 50%; transform: translateX(-50%); }
    .node-contact .node-label { top: 50%; left: 1.4rem; transform: translateY(-50%); }

    .globe-lines {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      overflow: visible;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(240,242,239,0.65);
      backdrop-filter: blur(10px);
    }

    .modal {
      position: relative;
      z-index: 1;
      background: white;
      border: 1px solid rgba(122,158,126,0.2);
      border-radius: 4px;
      padding: 2.5rem;
      width: min(520px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(100,130,103,0.14), 0 4px 20px rgba(100,130,103,0.08);
      transform: translateY(20px) scale(0.96);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 1.1rem; right: 1.1rem;
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--ink-muted);
      transition: all 0.2s;
    }

    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    .modal-eyebrow {
      font-size: 0.57rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.9rem;
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.9rem;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--ink);
    }

    .modal-title em { font-style: italic; }

    .modal-divider {
      width: 2rem; height: 1px;
      background: var(--accent-soft);
      margin-bottom: 1.75rem;
    }

    .about-text {
      font-size: 0.8rem;
      line-height: 1.9;
      color: var(--ink-muted);
    }

    .exp-item {
      margin-bottom: 1.75rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid rgba(122,158,126,0.12);
    }

    .exp-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .exp-period {
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .exp-role {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 300;
      margin-bottom: 0.15rem;
    }

    .exp-company { font-size: 0.68rem; color: var(--ink-muted); margin-bottom: 0.65rem; }

    .exp-bullets { list-style: none; }

    .exp-bullets li {
      font-size: 0.73rem;
      color: var(--ink-muted);
      line-height: 1.7;
      padding-left: 0.9rem;
      position: relative;
      margin-bottom: 0.2rem;
    }

    .exp-bullets li::before { content: '·'; position: absolute; left: 0; color: var(--accent); }

    .skills-group { margin-bottom: 1.4rem; }

    .skills-group-label {
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.65rem;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    .tag {
      font-size: 0.63rem;
      padding: 0.22rem 0.55rem;
      border: 1px solid rgba(122,158,126,0.3);
      border-radius: 2px;
      color: var(--ink);
      background: rgba(122,158,126,0.04);
      letter-spacing: 0.03em;
    }

    .edu-item {
      margin-bottom: 1.4rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid rgba(122,158,126,0.12);
    }

    .edu-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .edu-period {
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .edu-school {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      margin-bottom: 0.15rem;
    }

    .edu-degree { font-size: 0.7rem; color: var(--ink-muted); line-height: 1.5; }

    .contact-links-list { display: flex; flex-direction: column; gap: 0.65rem; }

    .contact-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(122,158,126,0.2);
      border-radius: 2px;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.2s;
    }

    .contact-link:hover {
      border-color: var(--accent);
      background: rgba(122,158,126,0.04);
      color: var(--accent);
    }

    .contact-link-label {
      font-size: 0.53rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.12rem;
    }

    .contact-link-value { font-size: 0.76rem; }
    .contact-arrow { font-size: 0.7rem; opacity: 0.3; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes globeIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0; transform: scale(2.8); } }
    @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>

  <script>
    const overlay = document.getElementById('modal-overlay');
    const content = document.getElementById('modal-content');
    const backdrop = document.getElementById('modal-backdrop');

    const templates = {
      about: 'tpl-about',
      experience: 'tpl-experience',
      skills: 'tpl-skills',
      education: 'tpl-education',
      contact: 'tpl-contact'
    };

    function openModal(section) {
      const tpl = document.getElementById(templates[section]);
      if (!tpl) return;
      content.innerHTML = '';
      content.appendChild(tpl.content.cloneNode(true));
      overlay.classList.add('active');
      document.getElementById('close-btn').addEventListener('click', closeModal);
    }

    function closeModal() {
      overlay.classList.remove('active');
    }

    document.querySelectorAll('.node').forEach(node => {
      node.addEventListener('click', () => openModal(node.dataset.section));
    });

    backdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
